<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Categorías - LibroVibe Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8f9fa; 
        }
        
        /* Estilo de la Tarjeta Principal (Glassmorphism) */
        .main-card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Tabla Estilizada */
        .table thead th {
            background-color: #f8f9fa;
            color: #6b7280;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-top: none;
            padding: 1.2rem;
        }

        .table tbody tr {
            transition: all 0.3s;
            border-bottom: 1px solid #f1f5f9;
        }

        .table tbody tr:hover {
            background-color: #f8fafc !important;
            transform: scale(1.002);
        }

        /* Badges de Categoría */
        .badge-cat {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            font-weight: 600;
            padding: 0.5em 1em;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        /* Botones de Acción Pro */
        .btn-action {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .btn-edit { background-color: #e0e7ff; color: #4338ca; }
        .btn-edit:hover { background-color: #4338ca; color: white; transform: translateY(-2px); }
        
        .btn-delete { background-color: #fee2e2; color: #dc2626; }
        .btn-delete:hover { background-color: #dc2626; color: white; transform: translateY(-2px); }

        /* Alertas Estilizadas */
        .alert {
            border: none;
            border-radius: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container-fluid py-5 px-4">
        
        <div class="d-flex justify-content-between align-items-end mb-5" data-aos="fade-down">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}" class="text-decoration-none text-muted small">Admin</a></li>
                        <li class="breadcrumb-item active fw-bold text-primary small">Categorías</li>
                    </ol>
                </nav>
                <h1 class="h2 mb-0 text-dark fw-bold">Géneros y Categorías</h1>
                <p class="text-muted mb-0">Organiza tus libros por etiquetas y géneros literarios.</p>
            </div>
            <a th:href="@{/categorias/nuevo}" class="btn btn-success px-4 py-2 rounded-3 shadow-sm fw-bold">
                <i class="bi bi-plus-circle me-2"></i> Nueva Categoría
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success shadow-sm mb-4" data-aos="fade-right" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger shadow-sm mb-4" data-aos="fade-right" th:text="${error}"></div>

        <div class="card main-card overflow-hidden" data-aos="fade-up">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Nombre del Género</th>
                                <th>Descripción</th>
                                <th class="text-center pe-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat, iter : ${listaCategorias}" th:data-aos-delay="${iter.index * 50}">
                                <td class="ps-4 fw-bold text-muted" th:text="${'#' + cat.idCategoria}"></td>
                                <td>
                                    <span class="badge-cat" th:text="${cat.nombre}"></span>
                                </td>
                                <td>
                                    <span class="text-muted small" th:text="${cat.descripcion}"></span>
                                </td>
                                <td class="text-center pe-4">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a th:href="@{/categorias/editar/{id}(id=${cat.idCategoria})}" 
                                           class="btn-action btn-edit" title="Editar Categoría">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>
                                        
                                        <a th:href="@{/categorias/eliminar/{id}(id=${cat.idCategoria})}" 
                                           class="btn-action btn-delete" 
                                           onclick="return confirm('¿Estás seguro de eliminar esta categoría? Si hay libros asociados, la acción será cancelada por seguridad.')"
                                           title="Eliminar Categoría">
                                            <i class="bi bi-trash3-fill"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(listaCategorias)}">
                                <td colspan="4" class="text-center py-5 text-muted">
                                    <i class="bi bi-info-circle fs-2 d-block mb-2"></i>
                                    No hay categorías registradas aún.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4 px-3 d-flex justify-content-between text-muted small">
            <p>Estructura de clasificación para la tienda LibroVibe.</p>
            <p><i class="bi bi-shield-lock me-1"></i> Borrado protegido por integridad referencial.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            easing: 'ease-out-quad'
        });
    </script>
</body>
</html>
