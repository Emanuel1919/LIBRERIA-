<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Género - LibroVibe Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9;
            color: #1e293b;
        }

        .glass-card {
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .form-label { 
            font-size: 0.8rem;
            font-weight: 700; 
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .category-icon-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-update {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            opacity: 0.9;
        }

        .info-card {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            padding: 1rem;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                
                <nav aria-label="breadcrumb" class="mb-4" data-aos="fade-right">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}" class="text-decoration-none text-muted small">Admin</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/categorias}" class="text-decoration-none text-muted small">Categorías</a></li>
                        <li class="breadcrumb-item active small fw-bold text-primary">Editar Género</li>
                    </ol>
                </nav>

                <div class="card glass-card p-4" data-aos="zoom-in">
                    <div class="d-flex align-items-center mb-5 pb-3 border-bottom">
                        <div class="category-icon-box me-3">
                            <i class="bi bi-tags-fill"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold">Modificar Categoría</h4>
                            <p class="text-muted small mb-0" th:text="'Editando el registro ID: #' + ${categoria.idCategoria}"></p>
                        </div>
                    </div>

                    <form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post">
                        
                        <input type="hidden" th:field="*{idCategoria}">

                        <div class="mb-4">
                            <label class="form-label">Nombre del Género Literario</label>
                            <div class="input-group">
                                <span class="input-group-text border-0 bg-transparent ps-0 text-muted">
                                    <i class="bi bi-bookmark-star"></i>
                                </span>
                                <input type="text" th:field="*{nombre}" class="form-control" 
                                       placeholder="Ej: Novela Histórica, Ciencia Ficción..." required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción de la Categoría</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="5" 
                                      placeholder="Explica qué tipo de libros pertenecen a esta sección..."></textarea>
                        </div>

                        <div class="info-card mb-5 d-flex align-items-start">
                            <i class="bi bi-shield-check text-primary me-3 fs-5"></i>
                            <p class="text-muted small mb-0">
                                <strong>Nota de integridad:</strong> Los cambios en el nombre se reflejarán inmediatamente en todos los libros etiquetados con esta categoría.
                            </p>
                        </div>

                        <div class="d-flex justify-content-between align-items-center pt-4 border-top">
                            <a th:href="@{/categorias}" class="text-decoration-none text-muted fw-bold small hover-link">
                                <i class="bi bi-arrow-left me-1"></i> Descartar
                            </a>
                            <button type="submit" class="btn btn-update shadow">
                                <i class="bi bi-cloud-arrow-up me-2"></i> Actualizar Categoría
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
