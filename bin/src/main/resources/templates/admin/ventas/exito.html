<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>¡Compra Confirmada! - LibroVibe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background: #fdfaf5; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Plus Jakarta Sans', sans-serif; }
        .success-card { border: none; border-radius: 30px; background: white; padding: 4rem; box-shadow: 0 20px 60px rgba(0,0,0,0.05); text-align: center; max-width: 500px; }
        .check-icon { font-size: 5rem; color: #10b981; }
        .btn-home { background: #5d4037; color: white; border-radius: 15px; padding: 12px 30px; font-weight: 700; transition: 0.3s; text-decoration: none; }
        .btn-home:hover { background: #3e2723; color: white; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="success-card" data-aos="zoom-in">
        <div class="mb-4">
            <i class="bi bi-check-circle-fill check-icon"></i>
        </div>
        <h1 class="fw-bold mb-3">¡Pedido Realizado!</h1>
        <p class="text-muted mb-5">Gracias por confiar en <strong>LibroVibe</strong>. Tu nueva aventura literaria está en camino.</p>
        
        <div class="d-grid gap-3">
            <a href="/" class="btn-home shadow-sm">
                <i class="bi bi-house-door me-2"></i>Volver al Inicio
            </a>
            <a th:href="@{/mis-compras}" class="btn btn-outline-secondary rounded-pill fw-bold">
                Ver mis pedidos
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
