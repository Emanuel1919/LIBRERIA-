<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - LibroVibe Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-book: #5d4037;
            --accent-gold: #c7a17a;
            --bg-cream: #fdfaf5;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(rgba(93, 64, 55, 0.8), rgba(93, 64, 55, 0.8)), 
                        url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0;
        }

        .login-card { 
            width: 100%; 
            max-width: 450px; 
            padding: 3rem; 
            border: none; 
            border-radius: 28px; 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            color: var(--primary-book);
            font-size: 2.5rem;
            font-weight: 700;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: #fff;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 4px rgba(199, 161, 122, 0.2);
        }

        .btn-login {
            background: var(--primary-book);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #3e2723;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(93, 64, 55, 0.3);
            color: white;
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: var(--accent-gold);
        }

        .back-link {
            color: var(--primary-book);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--accent-gold);
        }

        .alert-error {
            background: #fff1f2;
            border: 1px solid #fda4af;
            color: #e11d48;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card login-card" data-aos="zoom-in" data-aos-duration="1000">
            
            <div class="text-center mb-5">
                <h2 class="brand-title mb-1">LibroVibe</h2>
                <p class="text-muted small">Bienvenido de nuevo, bibliófilo.</p>
            </div>

            <form th:action="@{/login}" method="post">
                <div th:if="${error}" class="alert alert-error mb-4 d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    Usuario o clave incorrectos
                </div>

                <div class="mb-4">
                    <label class="form-label">Nombre de Usuario</label>
                    <div class="input-group bg-light rounded-3 border">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" name="username" class="form-control border-0 bg-transparent ps-0" 
                               placeholder="Tu usuario" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group bg-light rounded-3 border">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="password" class="form-control border-0 bg-transparent ps-0" 
                               placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small text-muted" for="remember">Recordarme</label>
                    </div>
                    <a href="#" class="small text-muted text-decoration-none">¿Olvidaste tu clave?</a>
                </div>

                <button type="submit" class="btn btn-login w-100 mb-4 shadow-sm">
                    Ingresar al Portal <i class="bi bi-arrow-right-short ms-1"></i>
                </button>
            </form>

            <div class="text-center">
                <p class="text-muted small mb-0">¿No tienes cuenta? <a href="#" class="back-link">Regístrate</a></p>
                <hr class="my-4 opacity-25">
                <a href="/" class="back-link small">
                    <i class="bi bi-house-door me-1"></i> Volver al Catálogo Principal
                </a>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
