<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Título - LibroVibe Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            color: #1e293b;
        }

        .glass-card {
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .form-label { 
            font-size: 0.85rem;
            font-weight: 700; 
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Contenedor de Imagen Pro */
        .upload-zone {
            width: 100%;
            height: 320px;
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        .upload-zone:hover {
            border-color: #6366f1;
            background: #f5f7ff;
        }

        #imgPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            z-index: 2;
        }

        .upload-content {
            z-index: 1;
            text-align: center;
        }

        .btn-save {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            opacity: 0.9;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <nav aria-label="breadcrumb" class="mb-4" data-aos="fade-right">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}" class="text-decoration-none text-muted small">Admin</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/libros}" class="text-decoration-none text-muted small">Inventario</a></li>
                        <li class="breadcrumb-item active small fw-bold text-primary">Nuevo Libro</li>
                    </ol>
                </nav>

                <div class="card glass-card p-4" data-aos="fade-up">
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-4 me-3">
                            <i class="bi bi-journal-plus text-primary fs-3"></i>
                        </div>
                        <div>
                            <h4 class="mb-0 fw-bold">Registrar Título</h4>
                            <p class="text-muted small mb-0">Ingresa los metadatos y arte del nuevo libro para el catálogo.</p>
                        </div>
                    </div>

                    <form th:action="@{/libros/guardar}" th:object="${libro}" method="post" enctype="multipart/form-data">
                        <div class="row g-4">
                            <div class="col-md-7">
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label">Título Principal</label>
                                        <input type="text" th:field="*{titulo}" class="form-control" placeholder="Ej: La sombra del viento" required>
                                    </div>

                                    <div class="col-md-12">
                                        <label class="form-label">Autor / Escritor</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-0 bg-transparent ps-0"><i class="bi bi-person text-muted"></i></span>
                                            <input type="text" th:field="*{autor}" class="form-control" placeholder="Nombre completo" required>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Categoría</label>
                                        <select th:field="*{categoria}" class="form-select" required>
                                            <option value="" selected disabled>Seleccione...</option>
                                            <option th:each="cat : ${categorias}" 
                                                    th:value="${cat.idCategoria}" 
                                                    th:text="${cat.nombre}"></option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Precio (S/)</label>
                                        <input type="number" step="0.01" th:field="*{precio}" class="form-control" placeholder="0.00" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Stock Inicial</label>
                                        <input type="number" th:field="*{stock}" class="form-control" placeholder="Cant. unidades" required>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-5">
                                <label class="form-label d-block mb-3 text-center">Portada del Libro</label>
                                <div class="upload-zone" onclick="document.getElementById('imagenArchivo').click()">
                                    <div class="upload-content" id="uploadContent">
                                        <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>
                                        <p class="mb-0 mt-2 fw-bold small text-muted">Click para subir imagen</p>
                                        <span class="text-xs text-secondary" style="font-size: 10px;">JPG, PNG (Máx. 2MB)</span>
                                    </div>
                                    <img id="imgPreview" src="#" alt="Previsualización">
                                </div>
                                
                                <input type="file" name="imagenArchivo" id="imagenArchivo" 
                                       style="display: none;" accept="image/*" required>
                            </div>
                        </div>

                        <div class="mt-5 d-flex justify-content-between align-items-center border-top pt-4">
                            <a th:href="@{/libros}" class="text-muted text-decoration-none fw-bold small">
                                <i class="bi bi-arrow-left me-1"></i> Volver al listado
                            </a>
                            <div class="d-flex gap-2">
                                <button type="reset" class="btn btn-light px-4 rounded-3 text-muted">Limpiar</button>
                                <button type="submit" class="btn btn-save text-white shadow">
                                    <i class="bi bi-check2-circle me-2"></i> Confirmar y Guardar
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const input = document.getElementById('imagenArchivo');
        const preview = document.getElementById('imgPreview');
        const content = document.getElementById('uploadContent');

        input.onchange = evt => {
            const [file] = input.files;
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                content.style.opacity = '0'; // Oculta el icono de subida suavemente
            }
        }
    </script>
</body>
</html>
