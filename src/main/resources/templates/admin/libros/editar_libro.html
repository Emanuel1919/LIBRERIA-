<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Título - LibroVibe Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9;
            color: #1e293b;
        }

        .glass-card {
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .form-label { 
            font-size: 0.8rem;
            font-weight: 700; 
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.7rem 1rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        /* Contenedor de Imagen de Edición */
        .edit-upload-zone {
            position: relative;
            width: 100%;
            max-width: 240px;
            height: 340px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 5px solid white;
            transition: transform 0.3s ease;
        }

        .edit-upload-zone:hover {
            transform: scale(1.02);
        }

        #imgPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay-edit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(99, 102, 241, 0.6);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .edit-upload-zone:hover .overlay-edit {
            opacity: 1;
        }

        .btn-update {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <nav aria-label="breadcrumb" class="mb-4" data-aos="fade-right">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}" class="text-decoration-none text-muted small">Admin</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/libros}" class="text-decoration-none text-muted small">Inventario</a></li>
                        <li class="breadcrumb-item active small fw-bold text-primary">Editar Libro</li>
                    </ol>
                </nav>

                <div class="card glass-card p-4" data-aos="zoom-in">
                    <div class="d-flex align-items-center mb-5 pb-3 border-bottom text-between">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 p-3 rounded-4 me-3">
                                <i class="bi bi-pencil-square text-primary fs-3"></i>
                            </div>
                            <div>
                                <h4 class="mb-0 fw-bold">Modificar Título</h4>
                                <p class="text-muted small mb-0">Actualiza los datos o cambia la portada del libro.</p>
                            </div>
                        </div>
                        <div class="ms-auto">
                            <span class="badge bg-dark rounded-pill px-3 py-2" th:text="'ID: ' + ${libro.idLibro}"></span>
                        </div>
                    </div>

                    <form th:action="@{/libros/actualizar}" th:object="${libro}" method="post" enctype="multipart/form-data">
                        
                        <input type="hidden" th:field="*{idLibro}">
                        <input type="hidden" name="source" th:value="${source}">

                        <div class="row g-5">
                            <div class="col-md-4 text-center">
                                <label class="form-label d-block mb-3">Portada del Libro</label>
                                <div class="edit-upload-zone" onclick="document.getElementById('imagenArchivo').click()">
                                    <img id="imgPreview" th:src="@{${libro.imagenUrl}}" alt="Portada Actual"
                                         onerror="this.src='https://via.placeholder.com/240x340?text=Sin+Imagen'">
                                    
                                    <div class="overlay-edit">
                                        <i class="bi bi-camera fs-1 mb-2"></i>
                                        <span class="fw-bold small">CAMBIAR IMAGEN</span>
                                    </div>
                                </div>
                                <input type="file" name="imagenArchivo" id="imagenArchivo" style="display: none;" accept="image/*">
                                <p class="text-muted mt-3" style="font-size: 0.7rem;">Haz clic sobre la imagen para subir una nueva.</p>
                            </div>

                            <div class="col-md-8">
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label">Título</label>
                                        <input type="text" th:field="*{titulo}" class="form-control" required>
                                    </div>

                                    <div class="col-md-12">
                                        <label class="form-label">Autor</label>
                                        <input type="text" th:field="*{autor}" class="form-control" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Categoría</label>
                                        <select th:field="*{categoria}" class="form-select" required>
                                            <option th:each="cat : ${categorias}" 
                                                    th:value="${cat.idCategoria}" 
                                                    th:text="${cat.nombre}"></option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Precio (S/)</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-0 bg-light">S/</span>
                                            <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Stock</label>
                                        <input type="number" th:field="*{stock}" class="form-control" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 d-flex justify-content-between align-items-center border-top pt-4">
                            <a th:href="${source == 'index' ? '/' : '/libros'}" class="text-decoration-none text-muted fw-bold small">
                                <i class="bi bi-arrow-left me-1"></i> Cancelar y volver
                            </a>
                            <button type="submit" class="btn btn-update shadow-sm px-5">
                                <i class="bi bi-cloud-check me-2"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // Lógica de Previsualización
        const input = document.getElementById('imagenArchivo');
        const preview = document.getElementById('imgPreview');

        input.onchange = evt => {
            const [file] = input.files;
            if (file) {
                preview.src = URL.createObjectURL(file);
            }
        }
    </script>
</body>
</html>
