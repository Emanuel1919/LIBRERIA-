<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario - LibroVibe Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
        .glass-card { border: none; border-radius: 24px; background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .form-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-control, .form-select { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; background: #f8fafc; transition: 0.3s; }
        .form-control:focus { background: white; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .btn-update { background: #5d4037; color: white; border: none; border-radius: 12px; padding: 14px; font-weight: 700; transition: 0.3s; }
        .btn-update:hover { background: #3e2723; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(93, 64, 55, 0.2); }
        
        /* Switch Custom */
        .form-check-input:checked { background-color: #10b981; border-color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card glass-card p-4" data-aos="zoom-in">
                    
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
                            <i class="bi bi-person-gear text-primary fs-3"></i>
                        </div>
                        <h4 class="fw-bold">Gestión de Cuenta</h4>
                        <p class="text-muted small">ID de Usuario: <span class="badge bg-light text-dark" th:text="${usuario.idUsuario}"></span></p>
                    </div>

                    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
                        <input type="hidden" th:field="*{idUsuario}">

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Actualizar o dejar igual">
                        </div>

                        <div class="mb-4 p-3 rounded-4 border bg-light bg-opacity-50">
                            <div class="form-check form-switch d-flex justify-content-between align-items-center p-0">
                                <label class="form-label mb-0" for="estadoSwitch">Estado de la cuenta</label>
                                <input class="form-check-input ms-0" type="checkbox" role="switch" id="estadoSwitch" 
                                       th:field="*{activo}" style="width: 2.5em; height: 1.25em; cursor: pointer;">
                            </div>
                            <div class="mt-1 small text-muted">
                                <span th:if="*{activo}">El usuario puede acceder al sistema.</span>
                                <span th:unless="*{activo}">Acceso restringido temporalmente.</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Rol de Usuario</label>
                            
                            <div th:if="${session.usuarioLogueado.idUsuario == usuario.idUsuario}">
                                <select class="form-select bg-light" disabled>
                                    <option value="ROLE_ADMIN" selected>ADMINISTRADOR</option>
                                </select>
                                <input type="hidden" name="rol" value="ROLE_ADMIN">
                                <div class="mt-2">
                                    <span class="badge bg-warning text-dark fw-normal" style="font-size: 0.65rem;">
                                        <i class="bi bi-shield-lock me-1"></i> Rol protegido por seguridad
                                    </span>
                                </div>
                            </div>

                            <div th:unless="${session.usuarioLogueado.idUsuario == usuario.idUsuario}">
                                <select th:field="*{rol}" class="form-select">
                                    <option value="ROLE_CLIENTE">CLIENTE</option>
                                    <option value="ROLE_ADMIN">ADMINISTRADOR</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-update shadow-sm">
                                <i class="bi bi-cloud-arrow-up me-2"></i> Actualizar Usuario
                            </button>
                            <a th:href="@{/usuarios}" class="btn btn-link text-muted text-decoration-none small mt-1">
                                <i class="bi bi-arrow-left me-1"></i> Cancelar y volver
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
