<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Usuario - LibroVibe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .form-card { border-radius: 20px; border: none; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .form-control { border-radius: 10px; padding: 12px; }
    </style>
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card form-card p-4">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
                            <i class="bi bi-person-plus text-primary fs-3"></i>
                        </div>
                        <h4 class="fw-bold">Registrar Usuario</h4>
                    </div>

                    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">USERNAME</label>
                            <input type="text" th:field="*{username}" class="form-control" placeholder="Ej: admin_vibe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">CONTRASEÑA</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">ASIGNAR ROL</label>
                            <select th:field="*{rol}" class="form-select" style="border-radius: 10px; padding: 12px;">
                                <option th:value="ROLE_CLIENTE">CLIENTE</option>
                                <option value="ROLE_ADMIN">ADMINISTRADOR</option>
                            </select>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary py-3 fw-bold rounded-3">Guardar Usuario</button>
                            <a th:href="@{/usuarios}" class="btn btn-link text-muted text-decoration-none small">Cancelar y Volver</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
